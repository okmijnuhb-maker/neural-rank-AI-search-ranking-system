<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralRank — Page Not Found</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--text:#0f172a;--card:#ffffff;--border:#e2e8f0;--primary:#0C447C;--accent:#1D9E75}
[data-theme="dark"]{--bg:#0f172a;--text:#f1f5f9;--card:#1e293b;--border:#334155;--primary:#378ADD;--accent:#5DCAA5}
*{margin:0;padding:0;box-sizing:border-box;transition:background .3s,color .3s}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.btn-primary{background:var(--primary);color:#fff;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:500;text-decoration:none;display:inline-block}
.btn-outline{background:transparent;color:var(--primary);padding:12px 28px;border-radius:10px;border:2px solid var(--primary);cursor:pointer;font-size:15px;text-decoration:none;display:inline-block}
.toggle-btn{background:var(--border);border:none;border-radius:20px;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.floating{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
</style>
</head>
<body>

<nav style="background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between">
  <a href="index.html" style="font-size:20px;font-weight:700;color:var(--primary);text-decoration:none">Neural<span style="color:var(--accent)">Rank</span></a>
  <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">Dark mode</button>
</nav>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;text-align:center">
  <div style="max-width:500px">

    <div class="floating" style="font-size:80px;margin-bottom:24px">🔍</div>

    <div style="font-size:120px;font-weight:700;color:var(--primary);line-height:1;margin-bottom:8px">404</div>

    <h1 style="font-size:28px;font-weight:700;margin-bottom:12px">Page not found</h1>
    <p style="color:#64748b;font-size:16px;line-height:1.7;margin-bottom:32px">Looks like this page got lost in the ranking algorithm. Even LambdaMART couldn't find it!</p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px">
      <a href="index.html" class="btn-primary">Go home</a>
      <a href="search.html" class="btn-outline">Try search</a>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:left">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#64748b">Quick links</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <a href="search.html" style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:var(--bg);text-decoration:none;color:var(--text);font-size:13px">
          <span>🔍</span> Live Search
        </a>
        <a href="compare.html" style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:var(--bg);text-decoration:none;color:var(--text);font-size:13px">
          <span>📊</span> Compare Models
        </a>
        <a href="explain.html" style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:var(--bg);text-decoration:none;color:var(--text);font-size:13px">
          <span>💡</span> SHAP Explainer
        </a>
        <a href="about.html" style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:var(--bg);text-decoration:none;color:var(--text);font-size:13px">
          <span>ℹ️</span> About
        </a>
      </div>
    </div>

  </div>
</div>

<footer style="background:var(--card);border-top:1px solid var(--border);padding:20px 24px;text-align:center">
  <span style="color:#64748b;font-size:13px">2026 NeuralRank — Even 404 pages need good ranking!</span>
</footer>

<script>
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeBtn').textContent = isDark?'Dark mode':'Light mode';
  localStorage.setItem('theme', isDark?'light':'dark');
}
const saved = localStorage.getItem('theme');
if(saved) document.documentElement.setAttribute('data-theme', saved);

setTimeout(()=>{
  const countdown = document.createElement('p');
  countdown.style.cssText = 'color:#64748b;font-size:13px;margin-top:16px';
  document.querySelector('.floating').parentElement.appendChild(countdown);
  let t = 10;
  const timer = setInterval(()=>{
    countdown.textContent = `Redirecting to home in ${t}s...`;
    if(--t < 0){ clearInterval(timer); window.location.href='index.html'; }
  }, 1000);
}, 1000);
</script>
</body>
</html>
