<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralRank — Users</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--text:#0f172a;--card:#ffffff;--border:#e2e8f0;--primary:#0C447C;--accent:#1D9E75}
[data-theme="dark"]{--bg:#0f172a;--text:#f1f5f9;--card:#1e293b;--border:#334155;--primary:#378ADD;--accent:#5DCAA5}
*{margin:0;padding:0;box-sizing:border-box;transition:background .3s,color .3s}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;border-radius:8px;margin:2px 8px}
.sidebar-link:hover{background:rgba(255,255,255,0.15);color:#fff}
.sidebar-link.active{background:rgba(255,255,255,0.2);color:#fff;font-weight:600}
.main{margin-left:240px;flex:1;padding:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.toggle-btn{background:rgba(255,255,255,0.2);border:none;border-radius:20px;padding:6px 12px;cursor:pointer;font-size:12px;color:#fff}
.badge-admin{background:#E6F1FB;color:#0C447C;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-user{background:#E1F5EE;color:#0F6E56;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.search-input{padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none;width:280px}
.search-input:focus{border-color:var(--primary)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:12px;color:#64748b;font-weight:500;border-bottom:2px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--bg)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
</style>
</head>
<body>

<div class="sidebar">
  <div style="padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.1)">
    <div style="font-size:18px;font-weight:700">Neural<span style="color:#5DCAA5">Rank</span></div>
    <div style="font-size:12px;opacity:0.7;margin-top:4px">Admin Panel</div>
  </div>
  <div style="padding:16px 0;flex:1">
    <div style="font-size:11px;opacity:0.5;padding:8px 20px;text-transform:uppercase;letter-spacing:1px">Main</div>
    <a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
    <a href="queries.html" class="sidebar-link">🔍 Query Logs</a>
    <a href="users.html" class="sidebar-link active">👥 Users</a>
    <div style="font-size:11px;opacity:0.5;padding:16px 20px 8px;text-transform:uppercase;letter-spacing:1px">Analytics</div>
    <a href="../compare.html" class="sidebar-link">📈 Model Metrics</a>
    <a href="../explain.html" class="sidebar-link">💡 SHAP Explorer</a>
    <div style="font-size:11px;opacity:0.5;padding:16px 20px 8px;text-transform:uppercase;letter-spacing:1px">App</div>
    <a href="../search.html" class="sidebar-link">🌐 Live Search</a>
    <a href="../index.html" class="sidebar-link">🏠 Homepage</a>
  </div>
  <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
    <div style="font-size:13px;opacity:0.8;margin-bottom:8px" id="adminName">Admin</div>
    <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn" style="margin-bottom:8px;width:100%">Dark mode</button>
    <button onclick="logout()" style="width:100%;padding:8px;background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px">Sign Out</button>
  </div>
</div>

<div class="main">
  <div style="margin-bottom:32px">
    <h1 style="font-size:26px;font-weight:700">Users</h1>
    <p style="color:#64748b;font-size:14px;margin-top:4px">Manage all registered users</p>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px">
    <div class="stat-card">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Total Users</div>
      <div style="font-size:28px;font-weight:700;color:var(--primary)" id="totalUsers">—</div>
    </div>
    <div class="stat-card">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Admin Users</div>
      <div style="font-size:28px;font-weight:700;color:var(--primary)" id="adminUsers">—</div>
    </div>
    <div class="stat-card">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Regular Users</div>
      <div style="font-size:28px;font-weight:700;color:var(--accent)" id="regularUsers">—</div>
    </div>
    <div class="stat-card">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Latest Signup</div>
      <div style="font-size:14px;font-weight:700;color:var(--primary);margin-top:8px" id="latestUser">—</div>
    </div>
  </div>

  <!-- Users Table -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <input class="search-input" type="text" id="searchFilter" placeholder="🔍 Search users..." oninput="filterTable()">
      <div style="display:flex;gap:8px">
        <button onclick="filterByRole('all')" id="btn-all" style="padding:7px 16px;border-radius:8px;border:1.5px solid var(--primary);background:var(--primary);color:#fff;cursor:pointer;font-size:13px">All</button>
        <button onclick="filterByRole('admin')" id="btn-admin" style="padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px">Admins</button>
        <button onclick="filterByRole('user')" id="btn-user" style="padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px">Users</button>
        <button onclick="loadUsers()" style="padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Refresh</button>
      </div>
    </div>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
let allUsers = [];
let currentRole = 'all';

function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeBtn').textContent = isDark?'Dark mode':'Light mode';
  localStorage.setItem('theme', isDark?'light':'dark');
}
const saved = localStorage.getItem('theme');
if(saved) document.documentElement.setAttribute('data-theme', saved);

function logout(){ localStorage.removeItem('user'); window.location.href='../login.html'; }
const user = JSON.parse(localStorage.getItem('user')||'{}');
if(user.username) document.getElementById('adminName').textContent = user.username;

const colors = ['#0C447C','#1D9E75','#9b59b6','#e74c3c','#f39c12','#3498db'];

async function loadUsers(){
  try{
    const res = await fetch(`${API}/admin/users`);
    allUsers = await res.json();

    document.getElementById('totalUsers').textContent = allUsers.length;
    document.getElementById('adminUsers').textContent = allUsers.filter(u=>u.role==='admin').length;
    document.getElementById('regularUsers').textContent = allUsers.filter(u=>u.role==='user').length;
    if(allUsers.length){
      const latest = allUsers[allUsers.length-1];
      document.getElementById('latestUser').textContent = latest.username;
    }
    renderTable(allUsers);
  } catch(e){
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#e74c3c">Backend not connected</td></tr>';
  }
}

function renderTable(data){
  if(!data.length){
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b">No users found</td></tr>';
    return;
  }
  document.getElementById('tableBody').innerHTML = data.map((u,i)=>`
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar" style="background:${colors[i%colors.length]}">${u.username[0].toUpperCase()}</div>
          <span style="font-weight:600">${u.username}</span>
        </div>
      </td>
      <td style="color:#64748b">${u.email||'—'}</td>
      <td><span class="${u.role==='admin'?'badge-admin':'badge-user'}">${u.role}</span></td>
      <td style="color:#64748b;font-size:12px">${u.created_at?new Date(u.created_at).toLocaleString():'—'}</td>
      <td><span style="background:#E1F5EE;color:#0F6E56;padding:3px 10px;border-radius:20px;font-size:12px">Active</span></td>
    </tr>`).join('');
}

function filterTable(){
  const q = document.getElementById('searchFilter').value.toLowerCase();
  const filtered = allUsers.filter(u=>
    u.username.toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q)
  );
  renderTable(currentRole==='all' ? filtered : filtered.filter(u=>u.role===currentRole));
}

function filterByRole(role){
  currentRole = role;
  ['all','admin','user'].forEach(r=>{
    const btn = document.getElementById(`btn-${r}`);
    btn.style.background = r===role ? 'var(--primary)' : 'transparent';
    btn.style.color = r===role ? '#fff' : 'var(--text)';
    btn.style.borderColor = r===role ? 'var(--primary)' : 'var(--border)';
  });
  renderTable(role==='all' ? allUsers : allUsers.filter(u=>u.role===role));
}

loadUsers();
</script>
</body>
</html>
