<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralRank — Login</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--text:#0f172a;--card:#ffffff;--border:#e2e8f0;--primary:#0C447C;--accent:#1D9E75}
[data-theme="dark"]{--bg:#0f172a;--text:#f1f5f9;--card:#1e293b;--border:#334155;--primary:#378ADD;--accent:#5DCAA5}
*{margin:0;padding:0;box-sizing:border-box;transition:background .3s,color .3s}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.input-field{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;outline:none}
.input-field:focus{border-color:var(--primary)}
.btn-primary{width:100%;background:var(--primary);color:#fff;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600}
.btn-primary:hover{opacity:0.9}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#64748b;border-bottom:2px solid transparent}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.error-msg{background:#FCEBEB;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.success-msg{background:#E1F5EE;color:#0F6E56;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.toggle-btn{background:var(--border);border:none;border-radius:20px;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--text)}
</style>
</head>
<body>

<nav style="background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100">
  <div style="max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between">
    <a href="index.html" style="font-size:20px;font-weight:700;color:var(--primary);text-decoration:none">Neural<span style="color:var(--accent)">Rank</span></a>
    <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">Dark mode</button>
  </div>
</nav>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="width:100%;max-width:420px">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:40px;margin-bottom:12px">🔐</div>
      <h1 style="font-size:26px;font-weight:700;margin-bottom:8px">Welcome back</h1>
      <p style="color:#64748b;font-size:14px">Sign in to access your NeuralRank dashboard</p>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden">

      <!-- Tabs -->
      <div style="display:flex;border-bottom:1px solid var(--border)">
        <button class="tab-btn active" onclick="switchTab('login')" id="tab-login">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')" id="tab-signup">Sign Up</button>
      </div>

      <div style="padding:28px">

        <!-- Login Form -->
        <div id="loginForm">
          <div id="loginError" class="error-msg" style="margin-bottom:16px"></div>
          <div id="loginSuccess" class="success-msg" style="margin-bottom:16px"></div>

          <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Username</label>
            <input class="input-field" id="loginUsername" type="text" placeholder="Enter your username">
          </div>
          <div style="margin-bottom:8px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Password</label>
            <div style="position:relative">
              <input class="input-field" id="loginPassword" type="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
              <button onclick="togglePassword('loginPassword')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁</button>
            </div>
          </div>
          <div style="text-align:right;margin-bottom:20px">
            <a href="#" style="font-size:13px;color:var(--primary)">Forgot password?</a>
          </div>
          <button class="btn-primary" onclick="doLogin()" id="loginBtn">Sign In</button>

          <div style="text-align:center;margin-top:20px;font-size:13px;color:#64748b">
            Demo credentials: <strong>admin</strong> / <strong>admin123</strong>
          </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" style="display:none">
          <div id="signupError" class="error-msg" style="margin-bottom:16px"></div>
          <div id="signupSuccess" class="success-msg" style="margin-bottom:16px"></div>

          <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Username</label>
            <input class="input-field" id="signupUsername" type="text" placeholder="Choose a username">
          </div>
          <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Email</label>
            <input class="input-field" id="signupEmail" type="email" placeholder="Enter your email">
          </div>
          <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Password</label>
            <div style="position:relative">
              <input class="input-field" id="signupPassword" type="password" placeholder="Create a password">
              <button onclick="togglePassword('signupPassword')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁</button>
            </div>
          </div>
          <div style="margin-bottom:20px">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Confirm Password</label>
            <input class="input-field" id="signupConfirm" type="password" placeholder="Confirm your password">
          </div>
          <button class="btn-primary" onclick="doSignup()" id="signupBtn">Create Account</button>
        </div>

      </div>
    </div>

    <div style="text-align:center;margin-top:24px">
      <a href="index.html" style="font-size:13px;color:#64748b;text-decoration:none">← Back to home</a>
    </div>
  </div>
</div>

<script>
const API = 'https://neural-rank-ai-search-ranking-system.onrender.com';

function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeBtn').textContent = isDark?'Dark mode':'Light mode';
  localStorage.setItem('theme', isDark?'light':'dark');
}
const saved = localStorage.getItem('theme');
if(saved) document.documentElement.setAttribute('data-theme', saved);

function switchTab(tab){
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
}

function togglePassword(id){
  const el = document.getElementById(id);
  el.type = el.type==='password'?'text':'password';
}

function showMsg(id, msg, isError){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  el.className = isError ? 'error-msg' : 'success-msg';
  el.style.marginBottom = '16px';
}

async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!username || !password){ showMsg('loginError','Please fill all fields',true); return; }

  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...'; btn.disabled = true;

  try{
    const res = await fetch(`${API}/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(res.ok){
      showMsg('loginSuccess', `Welcome back, ${data.username}! Redirecting...`, false);
      localStorage.setItem('user', JSON.stringify(data));
      setTimeout(()=>{
        window.location.href = data.role==='admin' ? 'admin/dashboard.html' : 'search.html';
      }, 1200);
    } else {
      showMsg('loginError', data.detail || 'Invalid credentials', true);
    }
  } catch(e){
    showMsg('loginError', 'Cannot connect to server. Make sure backend is running.', true);
  }
  btn.textContent = 'Sign In'; btn.disabled = false;
}

async function doSignup(){
  const username = document.getElementById('signupUsername').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;

  if(!username || !email || !password){ showMsg('signupError','Please fill all fields',true); return; }
  if(password !== confirm){ showMsg('signupError','Passwords do not match',true); return; }
  if(password.length < 6){ showMsg('signupError','Password must be at least 6 characters',true); return; }

  const btn = document.getElementById('signupBtn');
  btn.textContent = 'Creating account...'; btn.disabled = true;

  try{
    const res = await fetch(`${API}/signup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    if(res.ok){
      showMsg('signupSuccess', 'Account created! Please sign in.', false);
      setTimeout(()=> switchTab('login'), 1500);
    } else {
      showMsg('signupError', data.detail || 'Signup failed', true);
    }
  } catch(e){
    showMsg('signupError', 'Cannot connect to server.', true);
  }
  btn.textContent = 'Create Account'; btn.disabled = false;
}
</script>
</body>
</html>
